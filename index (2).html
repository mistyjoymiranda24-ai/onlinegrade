<!DOCTYPE html>
<html>
<head>
    <title>Student Grades Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
            color: black;
            padding: 20px;
        }

        /* Header with two logos and centered title */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .header h1 {
            flex: 1;
            text-align: center;
            margin: 0;
        }

        .logo {
            height: 80px;
            width: auto;
        }

        /* College name just below the title */
        .college-name {
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-top: 2px;   /* minimal space from title */
            margin-bottom: 10px; /* space before the container */
            color: #600000;     /* dark maroon */
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: #600000;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            padding: 6px;
            margin: 5px;
            width: 120px;
        }

        button {
            padding: 6px 12px;
            margin: 5px;
            background: white;
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: black;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: black;
            margin-top: 20px;
        }

        th, td {
            padding: 8px;
            border: 1px solid #4b0000;
            text-align: center;
        }

        th {
            background: #600000;
            color: white;
        }
    </style>
</head>
<body>

<!-- Header with left and right logos and centered title -->
<div class="header">
    <!-- Left logo (placeholder) -->
    <img src="passi-city-college.jpg" alt="Left Logo" class="logo">
    
    <h1>Student Grades Sheet</h1>
    
    <!-- Right logo (placeholder) -->
    <img src="bsit.png" alt="Right Logo" class="logo">
</div>

<!-- PASSI CITY COLLEGE just below the title -->
<p class="college-name">PASSI CITY COLLEGE</p>

<div class="container">

    <!-- Hidden field for editing -->
    <input type="hidden" id="studentId">

    <!-- Input Fields -->
    <input type="text" id="name" placeholder="Student Name">
    <input type="number" id="ias302" placeholder="IAS 302">
    <input type="number" id="sa301" placeholder="SA 301">
    <input type="number" id="itelec3" placeholder="IT ELEC 3">
    <input type="number" id="itelec4" placeholder="IT ELEC 4">
    <input type="number" id="cap301" placeholder="Cap 301">

    <button onclick="saveStudent()">Save Student</button>

    <!-- Student Table -->
    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>IAS 302</th>
                <th>SA 301</th>
                <th>IT ELEC 3</th>
                <th>IT ELEC 4</th>
                <th>Cap 301</th>
                <th>Average</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

function saveToStorage() {
    localStorage.setItem("students", JSON.stringify(students));
}

function calculateAverage(s1, s2, s3, s4, s5) {
    return ((s1 + s2 + s3 + s4 + s5) / 5).toFixed(2);
}

function saveStudent() {
    const idField = document.getElementById("studentId").value;
    const name = document.getElementById("name").value.trim();
    const s1 = parseFloat(document.getElementById("ias302").value);
    const s2 = parseFloat(document.getElementById("sa301").value);
    const s3 = parseFloat(document.getElementById("itelec3").value);
    const s4 = parseFloat(document.getElementById("itelec4").value);
    const s5 = parseFloat(document.getElementById("cap301").value);

    if (!name || isNaN(s1) || isNaN(s2) || isNaN(s3) || isNaN(s4) || isNaN(s5)) {
        alert("Please complete all fields.");
        return;
    }

    const average = calculateAverage(s1, s2, s3, s4, s5);

    if (idField) {
        const index = students.findIndex(s => s.id == idField);
        students[index] = { id: idField, name, s1, s2, s3, s4, s5, average };
    } else {
        const newStudent = {
            id: Date.now(),
            name,
            s1,
            s2,
            s3,
            s4,
            s5,
            average
        };
        students.push(newStudent);
    }

    saveToStorage();
    renderTable();
    clearFields();
}
